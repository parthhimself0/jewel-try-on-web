<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Jewelry Virtual Try-On</title>
    <link rel="stylesheet" href="/static/style.css">
</head>
<body>
    <div id="app">
        <canvas id="videoCanvas"></canvas>
        <div id="overlay">
            <div id="status"></div>
            <div id="controls">
                <button id="necklaceOpenBtn" class="control-btn">
                    <img id="necklacePreview" src="" alt="">
                    <span>Necklaces</span>
                </button>
                <label id="clipToggle" class="toggle-label">
                    <input type="checkbox" id="clipCheckbox" checked>
                    <span class="toggle-slider"></span>
                    Face Clip
                </label>
                <button id="resetBtn" title="Reset calibration">Reset</button>
            </div>
        </div>
        <div id="connectionStatus">Connecting...</div>
        <div id="sheetBackdrop"></div>
        <div id="sheet">
            <div id="sheetHandle"></div>
            <div id="sheetTitle">Choose a Necklace</div>
            <div id="sheetGrid"></div>
        </div>
    </div>
    <script src="/static/app.js"></script>
</body>
</html>
