<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Jewelry Virtual Try-On</title>
    <link rel="stylesheet" href="/static/style.css">
</head>
<body>
    <div id="app">
        <canvas id="videoCanvas"></canvas>
        <div id="overlay">
            <div id="status"></div>
            <div id="controls">
                <button id="jewelryOpenBtn" class="control-btn">
                    <span>Jewelry</span>
                </button>
                <label id="clipToggle" class="toggle-label">
                    <input type="checkbox" id="clipCheckbox" checked>
                    <span class="toggle-slider"></span>
                    Face Clip
                </label>
                <label id="debugMaskToggle" class="toggle-label">
                    <input type="checkbox" id="debugMaskCheckbox">
                    <span class="toggle-slider"></span>
                    Debug Mask
                </label>
                <label id="debugSilhouetteToggle" class="toggle-label">
                    <input type="checkbox" id="debugSilhouetteCheckbox">
                    <span class="toggle-slider"></span>
                    Debug Silhouette
                </label>
                <button id="resetBtn" title="Reset calibration">Reset</button>
            </div>
        </div>
        <div id="connectionStatus">Connecting...</div>
        <div id="sheetBackdrop"></div>
        <div id="sheet">
            <div id="sheetHandle"></div>
            <div id="sheetTabs">
                <button class="sheet-tab active" data-category="necklaces">Necklaces</button>
                <button class="sheet-tab" data-category="earrings">Earrings</button>
            </div>
            <div id="sheetGrid"></div>
        </div>
    </div>
    <script src="/static/app.js"></script>
</body>
</html>
